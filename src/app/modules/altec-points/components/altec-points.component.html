<div class="altec-points-page">
  <div class="container py-4" style="max-width: 620px;">

    <!-- ── HEADER ── -->
    <div class="page-header mb-4">
      <div class="header-icon"><i class="bi bi-star-fill"></i></div>
      <h1 class="page-title">Acreditar Altec-Puntos</h1>
      <p class="page-subtitle">Busca el cliente y acredita su saldo</p>
    </div>

    <form [formGroup]="formGroup" (ngSubmit)="onSubmit()" autocomplete="off">

      <!-- ── CARD 1: Cliente ── -->
      <div class="form-card mb-3">
        <label class="field-label"><i class="bi bi-person me-1"></i>Cliente <span class="req-star">*</span></label>

        <div class="autocomplete-wrapper">
          <div class="input-icon-wrap">
            <i class="bi bi-search input-icon"></i>
            <input
              #productDescriptionInput
              type="text"
              formControlName="productDescription"
              class="field-input with-icon"
              placeholder="Buscar cliente por nombre..."
              autocomplete="off"
              (focus)="clearOnFocus()"
              (blur)="deferClose()"
              (keydown)="onSearchKeydown($event)"
              [attr.aria-expanded]="showDropdown"
            />
          </div>

          <!-- Dropdown sugerencias -->
          <ul class="autocomplete-menu" *ngIf="showDropdown">
            <li *ngIf="loading" class="autocomplete-item loading-item">
              <span class="spinner-border spinner-border-sm me-2" role="status"></span>
              Buscando...
            </li>
            <li *ngFor="let u of suggestions; let i = index">
              <button
                type="button"
                class="autocomplete-item"
                [class.active]="i === activeIndex"
                (pointerdown)="onSelect(u, $event)">
                <i class="bi bi-person-circle me-2"></i>
                <span>{{ u.name }}</span>
                <span class="username-chip">{{ '@' + u.username }}</span>
              </button>
            </li>
            <li *ngIf="!loading && suggestions.length === 0" class="autocomplete-item no-results">
              <i class="bi bi-person-x me-2"></i>Sin resultados
            </li>
          </ul>
        </div>

        <small class="field-error" *ngIf="formGroup.get('productDescription')?.invalid && formGroup.get('productDescription')?.touched">
          <i class="bi bi-exclamation-circle me-1"></i>El nombre del cliente es requerido.
        </small>

        <!-- Tarjeta usuario seleccionado -->
        <div *ngIf="selectedUser" class="selected-user-card mt-3">
          <div class="suc-avatar"><i class="bi bi-person-check-fill"></i></div>
          <div class="suc-info">
            <span class="suc-name">{{ selectedUser.name }}</span>
            <span class="suc-username">{{ '@' + selectedUser.username }}</span>
          </div>
          <div class="suc-balance">
            <span class="suc-label">Balance</span>
            <span class="points-badge">$ {{ selectedUser.altec_Points }}</span>
          </div>
        </div>
      </div>

      <!-- ── CARD 2: Monto ── -->
      <div class="form-card mb-4">
        <label class="field-label"><i class="bi bi-cash-stack me-1"></i>Monto de Venta <span class="req-star">*</span></label>
        <div class="input-prefix-wrap">
          <span class="input-prefix">$</span>
          <input
            type="text"
            formControlName="productCode"
            class="field-input with-prefix"
            placeholder="0.00"
            autocomplete="off"
          />
        </div>
      </div>

      <!-- ── SUBMIT ── -->
      <div class="text-center">
        <button type="submit" class="btn-submit">
          <i class="bi bi-star-fill me-2"></i>Acreditar Puntos
        </button>
      </div>

    </form>

    <div class="text-center mt-4">
      <span class="footer-text">Developed by <strong>SwiFt©</strong> (2025)</span>
    </div>

  </div>
</div>
