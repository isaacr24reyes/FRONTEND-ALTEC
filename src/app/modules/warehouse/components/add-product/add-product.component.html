<div class="add-product-page">
  <div class="container py-4" style="max-width: 860px;">

    <!-- ── HEADER ── -->
    <div class="page-header mb-4">
      <h1 class="page-title"><i class="bi bi-plus-circle-fill me-2"></i>Ingresar Producto</h1>
      <p class="page-subtitle">Completa los campos para agregar un nuevo producto al inventario</p>
    </div>

    <form [formGroup]="formGroup" (ngSubmit)="onSubmit()" autocomplete="off">

      <!-- ── CARD 1: Categoría ── -->
      <div class="form-card mb-3">
        <label class="field-label"><i class="bi bi-tag me-1"></i>Categoría <span class="req-star">*</span></label>
        <div class="category-wrapper">
          <div class="input-multiselect" (click)="toggleCategoryList($event)">
            <span class="chip" *ngIf="selectedCategory">{{ selectedCategory }}</span>
            <span class="placeholder-text" *ngIf="!selectedCategory">Seleccionar categoría...</span>
            <i class="bi bi-chevron-down caret" [class.rotated]="showCategoryList"></i>
          </div>
          <!-- Panel abre HACIA ARRIBA para no quedar tapado -->
          <div class="category-panel" *ngIf="showCategoryList">
            <div class="category-option"
                 *ngFor="let cat of categories"
                 (click)="selectCategory(cat, $event)"
                 [class.active]="cat === selectedCategory">
              <i class="bi bi-check2 check-icon me-1" *ngIf="cat === selectedCategory"></i>{{ cat }}
            </div>
          </div>
        </div>
      </div>

      <!-- ── CARD 2: Descripción ── -->
      <div class="form-card mb-3">
        <label class="field-label"><i class="bi bi-card-text me-1"></i>Descripción <span class="req-star">*</span></label>
        <input type="text" formControlName="productDescription"
               class="field-input" placeholder="Nombre o descripción del producto" autocomplete="off">
      </div>

      <!-- ── CARD 3: Precios + Stock ── -->
      <div class="form-card mb-3">
        <div class="row g-3">

          <div class="col-6 col-md-3">
            <label class="field-label"><i class="bi bi-boxes me-1"></i>Stock <span class="req-star">*</span></label>
            <input type="text" formControlName="productStock"
                   class="field-input" placeholder="0" appOnlyNumbers autocomplete="off">
          </div>

          <div class="col-6 col-md-3">
            <label class="field-label"><i class="bi bi-tag-fill me-1"></i>PVP <span class="req-star">*</span></label>
            <div class="input-prefix-wrap">
              <span class="input-prefix">$</span>
              <input type="text" formControlName="productPvp"
                     class="field-input with-prefix" placeholder="0.00" appOnlyNumbers autocomplete="off">
            </div>
          </div>

          <div class="col-6 col-md-3">
            <label class="field-label"><i class="bi bi-people-fill me-1"></i>Mayorista <span class="req-star">*</span></label>
            <div class="input-prefix-wrap">
              <span class="input-prefix">$</span>
              <input type="text" formControlName="productMp"
                     class="field-input with-prefix" placeholder="0.00" appOnlyNumbers autocomplete="off">
            </div>
          </div>

          <div class="col-6 col-md-3">
            <label class="field-label"><i class="bi bi-currency-dollar me-1"></i>Precio Compra</label>
            <div class="input-prefix-wrap">
              <span class="input-prefix">$</span>
              <input type="text" formControlName="productPi"
                     class="field-input with-prefix" placeholder="0.00" appOnlyNumbers autocomplete="off">
            </div>
          </div>

        </div>
      </div>

      <!-- ── CARD 4: Importación + Foto ── -->
      <div class="form-card mb-4">
        <div class="row g-3 align-items-start">

          <div class="col-md-4">
            <label class="field-label mb-2"><i class="bi bi-airplane-fill me-1"></i>¿Producto de importación?</label>
            <div class="toggle-wrap">
              <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="isImported" formControlName="isImported">
                <label class="form-check-label" for="isImported">
                  {{ formGroup.get('isImported')?.value ? 'Sí, es importado' : 'No' }}
                </label>
              </div>
            </div>
          </div>

          <div class="col-md-8">
            <label class="field-label mb-2"><i class="bi bi-image me-1"></i>Foto del producto</label>
            <div class="file-upload-zone"
              [class.drop-zone-active]="isDragging"
              (click)="fileInput.click()"
              (dragover)="onDragOver($event)"
              (dragleave)="onDragLeave($event)"
              (drop)="onDrop($event)">
              <ng-container *ngIf="!imagePreview && !isDragging">
                <i class="bi bi-cloud-arrow-up upload-icon"></i>
                <p class="upload-text mb-0">Click o arrastra una imagen aquí</p>
                <small class="upload-hint">JPG o PNG</small>
              </ng-container>
              <div class="drop-zone-overlay" *ngIf="isDragging">
                <i class="bi bi-cloud-arrow-up-fill"></i>
                <span>Suelta la imagen aquí</span>
              </div>
              <img *ngIf="imagePreview && !isDragging" [src]="imagePreview" alt="Preview" class="img-preview">
            </div>
            <input #fileInput type="file" accept=".jpg,.jpeg,.png"
                   (change)="onFileSelected($event)" style="display:none">
          </div>

        </div>
      </div>

      <!-- ── SUBMIT ── -->
      <div class="text-center">
        <button type="submit" class="btn-submit">
          <i class="bi bi-cloud-upload-fill me-2"></i>Guardar Producto
        </button>
      </div>

    </form>

    <div class="text-center mt-4">
      <span class="footer-text">Developed by <strong>SwiFt©</strong> (2025)</span>
    </div>

  </div>
</div>
